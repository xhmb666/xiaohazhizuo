<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>怀星 · 公告中心</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%233b82f6'/><text x='50' y='70' font-size='55' font-weight='800' text-anchor='middle' fill='white'>怀</text></svg>" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #0b0b10;
      color: #fff;
    }

    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(circle at 15% 20%, rgba(139, 92, 246, 0.25) 0%, transparent 40%),
        radial-gradient(circle at 85% 80%, rgba(219, 39, 119, 0.2) 0%, transparent 40%),
        linear-gradient(180deg, #0b0b10 0%, #161624 100%);
    }

    /* 登录页 */
    .login-wrap {
      position: relative; z-index: 1;
      min-height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 24px;
      transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .login-wrap.fade-out {
      opacity: 0;
      transform: scale(0.95) translateY(20px);
    }
    .logo {
      width: 92px; height: 92px; border-radius: 26px;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 50%, #db2777 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 44px; font-weight: 800;
      box-shadow: 0 16px 48px rgba(139, 92, 246, 0.35);
      margin-bottom: 22px;
    }
    .login-title { font-size: 34px; font-weight: 700; letter-spacing: 4px; margin-bottom: 10px; }
    .login-sub { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 44px; }
    .login-box { width: 100%; max-width: 320px; }
    .divider {
      display: flex; align-items: center; color: rgba(255,255,255,0.35); font-size: 13px; margin-bottom: 20px;
    }
    .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: rgba(255,255,255,0.12); }
    .divider span { padding: 0 12px; }
    .input-wrap { position: relative; margin-bottom: 14px; }
    .input-wrap svg {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      width: 20px; height: 20px; color: rgba(255,255,255,0.45);
    }
    input[type="text"] {
      width: 100%; height: 52px; padding: 0 16px 0 48px;
      border-radius: 14px; border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05); color: #fff; font-size: 15px; outline: none;
    }
    input[type="text"]::placeholder { color: rgba(255,255,255,0.3); }
    input[type="text"]:focus { border-color: rgba(139, 92, 246, 0.5); background: rgba(255,255,255,0.08); }
    input[type="text"].error { border-color: #ef4444; animation: shake 0.35s ease-in-out; }
    @keyframes shake {
      0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)}
    }
    .error-text { color: #ef4444; font-size: 12px; text-align: center; margin: -6px 0 12px; min-height: 18px; }
    .btn-primary {
      width: 100%; height: 50px; border-radius: 14px; border: none;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      color: #fff; font-size: 16px; font-weight: 600;
      box-shadow: 0 8px 24px rgba(59, 130, 246, 0.3); cursor: pointer;
    }
    .btn-primary:active { transform: scale(0.98); }

    /* 公告页 */
    .app { 
      display: none; position: relative; z-index: 1; min-height: 100%; padding-bottom: 40px;
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .app.fade-in {
      opacity: 1;
      transform: translateY(0);
    }
    .app-header {
      position: sticky; top: 0; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px;
      background: rgba(11, 11, 16, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .menu-btn { width: 36px; height: 36px; display: flex; flex-direction: column; justify-content: center; gap: 5px; }
    .menu-btn span { display: block; height: 2px; background: rgba(255,255,255,0.7); border-radius: 2px; }
    .menu-btn span:nth-child(1) { width: 18px; }
    .menu-btn span:nth-child(2) { width: 14px; }
    .header-title { font-size: 18px; font-weight: 700; letter-spacing: 2px; }
    .moon-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; }
    .moon-btn svg { width: 22px; height: 22px; color: rgba(255,255,255,0.7); }

    .container { padding: 16px; max-width: 520px; margin: 0 auto; }

    .welcome-card {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px; padding: 20px; margin-bottom: 16px;
    }
    .welcome-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .welcome-icon {
      width: 44px; height: 44px; border-radius: 14px;
      background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .welcome-icon svg { width: 24px; height: 24px; }
    .welcome-title { font-size: 22px; font-weight: 700; }
    .welcome-desc { font-size: 13px; color: rgba(255,255,255,0.5); line-height: 1.5; }

    .count-bar {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; padding: 14px 16px; margin-bottom: 16px;
    }
    .count-item { display: flex; align-items: center; gap: 8px; }
    .count-icon { width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: rgba(37, 99, 235, 0.15); color: #60a5fa; }
    .count-icon svg { width: 18px; height: 18px; }
    .count-label { font-size: 12px; color: rgba(255,255,255,0.45); }
    .count-num { font-size: 18px; font-weight: 700; }

    .announcement-card {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px; padding: 18px; margin-bottom: 16px;
    }
    .ann-header { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 14px; }
    .ann-icon {
      width: 50px; height: 50px; border-radius: 16px; flex-shrink: 0;
      background: linear-gradient(135deg, #2563eb 0%, #06b6d4 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 24px rgba(37, 99, 235, 0.25);
    }
    .ann-icon svg { width: 26px; height: 26px; }
    .ann-meta-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .ann-type { font-size: 12px; color: rgba(255,255,255,0.45); }
    .ann-title { font-size: 19px; font-weight: 700; }
    .ann-tags { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0 14px; }
    .ann-tag {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-radius: 20px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
      font-size: 12px; color: rgba(255,255,255,0.65);
    }
    .ann-body { font-size: 15px; line-height: 1.7; color: rgba(255,255,255,0.85); }

    /* 切换动画 */
    .content-wrap {
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .content-wrap.fade-out {
      opacity: 0;
      transform: translateX(-20px);
    }
    .content-wrap.fade-in {
      opacity: 0;
      transform: translateX(20px);
    }
    .content-wrap.fade-in.show {
      opacity: 1;
      transform: translateX(0);
    }

    .footer { text-align: center; padding: 20px; font-size: 12px; color: rgba(255,255,255,0.35); }

    /* 侧边栏 */
    .sidebar-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .sidebar-overlay.show { opacity: 1; pointer-events: auto; }
    .sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; z-index: 301;
      width: 280px; max-width: 80vw;
      background: linear-gradient(180deg, #12121e 0%, #0b0b10 100%);
      border-right: 1px solid rgba(255,255,255,0.08);
      transform: translateX(-100%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex; flex-direction: column;
      padding-top: env(safe-area-inset-top);
    }
    .sidebar.show { transform: translateX(0); }
    .sidebar-header {
      padding: 24px 20px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .sidebar-logo {
      width: 56px; height: 56px; border-radius: 16px;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 50%, #db2777 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 800;
      box-shadow: 0 8px 24px rgba(139, 92, 246, 0.3);
      margin-bottom: 12px;
    }
    .sidebar-title { font-size: 20px; font-weight: 700; letter-spacing: 2px; }
    .sidebar-sub { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 4px; }
    .sidebar-section-label {
      padding: 16px 20px 8px;
      font-size: 12px; color: rgba(255,255,255,0.35);
      text-transform: uppercase; letter-spacing: 1px;
    }
    .sidebar-item {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 20px;
      cursor: pointer;
      transition: background 0.2s;
      position: relative;
    }
    .sidebar-item:active { background: rgba(255,255,255,0.05); }
    .sidebar-item.active { background: rgba(59, 130, 246, 0.12); }
    .sidebar-item.active::before {
      content: ""; position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; background: linear-gradient(180deg, #3b82f6, #8b5cf6);
      border-radius: 0 3px 3px 0;
    }
    .sidebar-item-icon {
      width: 40px; height: 40px; border-radius: 12px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700;
    }
    .sidebar-item-icon.huai { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); color: #fff; }
    .sidebar-item-icon.le { background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%); color: #fff; }
    .sidebar-item-text { flex: 1; }
    .sidebar-item-name { font-size: 15px; font-weight: 600; }
    .sidebar-item-desc { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 2px; }
    .sidebar-item-badge {
      font-size: 11px; padding: 3px 8px; border-radius: 10px;
      background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6);
    }

    /* 彩蛋图标 */
    .easter-icon {
      position: fixed; top: 16px; left: 16px; z-index: 100;
      width: 40px; height: 40px; border-radius: 12px;
      background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
      display: none; align-items: center; justify-content: center;
      cursor: pointer; box-shadow: 0 4px 16px rgba(245, 158, 11, 0.4);
      animation: easterPulse 2s ease-in-out infinite;
      transition: transform 0.2s;
    }
    .easter-icon:active { transform: scale(0.9); }
    .easter-icon.show { display: flex; }
    .easter-icon svg { width: 22px; height: 22px; color: #fff; }
    @keyframes easterPulse {
      0%,100% { box-shadow: 0 4px 16px rgba(245, 158, 11, 0.4); }
      50% { box-shadow: 0 4px 28px rgba(245, 158, 11, 0.7); }
    }

    /* 彩蛋弹窗 */
    .easter-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(12px);
      display: none; align-items: center; justify-content: center;
      padding: 24px;
      opacity: 0;
      transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .easter-overlay.show { 
      display: flex; 
      opacity: 1;
    }
    .easter-modal {
      position: relative;
      width: 100%; max-width: 340px;
      background: linear-gradient(145deg, rgba(25, 25, 45, 0.98) 0%, rgba(15, 15, 30, 0.98) 100%);
      border: 1px solid rgba(245, 158, 11, 0.25);
      border-radius: 24px; 
      padding: 32px 26px;
      opacity: 0;
      transform: scale(0.9) translateY(30px);
      box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(245, 158, 11, 0.1);
    }
    .easter-overlay.show .easter-modal {
      animation: modalIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes modalIn {
      0% { opacity: 0; transform: scale(0.85) translateY(25px); }
      50% { opacity: 1; transform: scale(1.02) translateY(-5px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    .easter-modal::before {
      content: "";
      position: absolute; top: -1px; left: -1px; right: -1px; bottom: -1px;
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(245, 158, 11, 0.15) 0%, transparent 50%, rgba(239, 68, 68, 0.1) 100%);
      pointer-events: none;
    }
    .easter-close {
      position: absolute; top: 14px; right: 14px;
      width: 32px; height: 32px; 
      display: flex; align-items: center; justify-content: center;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.5); 
      cursor: pointer; 
      font-size: 18px;
      transition: all 0.2s;
    }
    .easter-close:hover { 
      background: rgba(255,255,255,0.1); 
      color: rgba(255,255,255,0.8);
    }
    .easter-close:active { transform: scale(0.9); }
    .easter-modal-title {
      font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 8px;
      color: #f59e0b;
      letter-spacing: 2px;
    }
    .easter-modal-desc {
      font-size: 14px; color: rgba(255,255,255,0.55); text-align: center; margin-bottom: 24px;
      line-height: 1.5;
    }
    .easter-input {
      width: 100%; height: 52px; padding: 0 20px;
      border-radius: 14px; 
      border: 1px solid rgba(245, 158, 11, 0.25);
      background: rgba(255,255,255,0.04); 
      color: #fff; 
      font-size: 16px;
      outline: none; 
      text-align: center; 
      letter-spacing: 4px;
      margin-bottom: 20px;
      transition: all 0.3s;
    }
    .easter-input::placeholder { 
      color: rgba(255,255,255,0.25); 
      letter-spacing: 1px; 
    }
    .easter-input:focus { 
      border-color: rgba(245, 158, 11, 0.5); 
      background: rgba(255,255,255,0.07); 
      box-shadow: 0 0 20px rgba(245, 158, 11, 0.1);
    }
    .easter-btn {
      width: 100%; height: 50px; border-radius: 14px; border: none;
      background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
      color: #fff; font-size: 16px; font-weight: 700; 
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(245, 158, 11, 0.35);
      transition: all 0.3s;
    }
    .easter-btn:hover { 
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(245, 158, 11, 0.45);
    }
    .easter-btn:active { 
      transform: translateY(0) scale(0.98); 
      box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
    }
    .easter-secret {
      display: none; 
      text-align: center; 
      padding: 16px 0 8px;
      animation: secretIn 0.4s ease-out;
    }
    .easter-secret.show { display: block; }
    @keyframes secretIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .easter-secret-text {
      font-size: 16px; color: #f59e0b; font-weight: 700;
      animation: secretGlow 2s ease-in-out infinite;
      letter-spacing: 1px;
    }
    @keyframes secretGlow {
      0%,100% { text-shadow: 0 0 10px rgba(245, 158, 11, 0.4); }
      50% { text-shadow: 0 0 30px rgba(245, 158, 11, 0.8); }
    }
  </style>
</head>
<body>
  <div class="bg"></div>

  <!-- 侧边栏遮罩 -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <!-- 侧边栏 -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">怀</div>
      <div class="sidebar-title">怀星</div>
      <div class="sidebar-sub">选择服务器查看公告</div>
    </div>
    <div class="sidebar-section-label">服务器列表</div>
    <div class="sidebar-item active" id="tab-huai" onclick="switchServer('huai')">
      <div class="sidebar-item-icon huai">怀</div>
      <div class="sidebar-item-text">
        <div class="sidebar-item-name">怀星服务器</div>
        <div class="sidebar-item-desc">主公告</div>
      </div>
      <div class="sidebar-item-badge" id="badge-huai">6</div>
    </div>
    <div class="sidebar-item" id="tab-le" onclick="switchServer('le')">
      <div class="sidebar-item-icon le">乐</div>
      <div class="sidebar-item-text">
        <div class="sidebar-item-name">小乐服务器</div>
        <div class="sidebar-item-desc">暂无公告</div>
      </div>
      <div class="sidebar-item-badge" id="badge-le" style="display:none">0</div>
    </div>
  </div>

  <!-- 彩蛋图标 -->
  <div class="easter-icon" id="easterIcon" onclick="openEasterModal()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
    </svg>
  </div>

  <!-- 彩蛋弹窗 -->
  <div class="easter-overlay" id="easterOverlay" onclick="closeEasterModal(event)">
    <div class="easter-modal" onclick="event.stopPropagation()">
      <div class="easter-close" onclick="closeEasterModal(event)">✕</div>
      <div class="easter-modal-title">彩蛋</div>
      <div class="easter-modal-desc">输入验证码解锁隐藏内容</div>
      <input type="text" class="easter-input" id="easterInput" placeholder="请输入验证码" autocomplete="off" />
      <button class="easter-btn" onclick="checkEaster()">确认</button>
      <div class="easter-secret" id="easterSecret">
        <div class="easter-secret-text">你发现了彩蛋！你是真正的怀星人 🌟</div>
      </div>
    </div>
  </div>

  <div class="login-wrap" id="loginPage">
    <div class="logo">怀</div>
    <div class="login-title">怀星</div>
    <div class="login-sub">那天，我听见了地铁逃生的声音，又细微又坚定。</div>

    <div class="login-box">
      <div class="divider"><span>进入服务器</span></div>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
          <line x1="8" y1="21" x2="16" y2="21"></line>
          <line x1="12" y1="17" x2="12" y2="21"></line>
        </svg>
        <input type="text" id="serverInput" placeholder="请输入服务器名称" autocomplete="off" />
      </div>
      <div class="error-text" id="errorText"></div>
      <button class="btn-primary" onclick="checkServer()">进入公告</button>
    </div>
  </div>

  <div class="app" id="appPage">
    <div class="app-header">
      <div class="menu-btn" onclick="openSidebar()"><span></span><span></span></div>
      <div class="header-title" id="headerTitle">怀星服务器</div>
      <div class="moon-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </div>
    </div>

    <div class="container">
      <div class="content-wrap" id="contentWrap">
      <div class="welcome-card">
        <div class="welcome-row">
          <div class="welcome-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" color="#fff">
              <path d="M3 11l18-5v12L3 14v-3z"></path>
              <path d="M11.6 16.8a3 3 0 1 1-3.2-4.8"></path>
            </svg>
          </div>
          <div class="welcome-title">公告中心</div>
        </div>
        <div class="welcome-desc">集中查看系统维护、版本更新和运营通知。</div>
      </div>

      <div class="count-bar">
        <div class="count-item">
          <div class="count-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l18-5v12L3 14v-3z"></path><path d="M11.6 16.8a3 3 0 1 1-3.2-4.8"></path></svg>
          </div>
          <div><div class="count-label">公告</div><div class="count-num" id="countNum">1</div></div>
        </div>
      </div>

      <div id="announcementList"></div>
      </div>
    </div>

    <div class="footer">企鹅交流：1043816309</div>
  </div>

  <script>
    const CORRECT_NAME = "怀星服务器";

    // 彩蛋逻辑
    let logoClickCount = 0;
    let logoClickTimer = null;

      if (server === currentServer) {
        closeSidebar();
        return;
      }
      currentServer = server;
      // 更新侧边栏选中状态
      document.getElementById("tab-huai").classList.toggle("active", server === "huai");
      document.getElementById("tab-le").classList.toggle("active", server === "le");

      document.getElementById("headerTitle").textContent = serverData[server].name;
      // 更新公告描述
      const leDesc = document.querySelector("#tab-le .sidebar-item-desc");
      const leBadge = document.getElementById("badge-le");
      const leCount = serverData.le.announcements.length;
      if (leCount > 0) {
        leDesc.textContent = leCount + " 条公告";
        leBadge.textContent = leCount;
        leBadge.style.display = "block";
      } else {

        leBadge.style.display = "none";

      // 关闭侧边栏
      closeSidebar();
