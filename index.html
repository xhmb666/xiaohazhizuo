<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>怀星 · 公告中心</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #0b0b10;
      color: #fff;
    }

    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(circle at 15% 20%, rgba(139, 92, 246, 0.25) 0%, transparent 40%),
        radial-gradient(circle at 85% 80%, rgba(219, 39, 119, 0.2) 0%, transparent 40%),
        linear-gradient(180deg, #0b0b10 0%, #161624 100%);
    }

    /* 登录页 */
    .login-wrap {
      position: relative; z-index: 1;
      min-height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 24px;
    }
    .logo {
      width: 92px; height: 92px; border-radius: 26px;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 50%, #db2777 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 44px; font-weight: 800;
      box-shadow: 0 16px 48px rgba(139, 92, 246, 0.35);
      margin-bottom: 22px;
    }
    .login-title { font-size: 34px; font-weight: 700; letter-spacing: 4px; margin-bottom: 10px; }
    .login-sub { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 44px; }
    .login-box { width: 100%; max-width: 320px; }
    .divider {
      display: flex; align-items: center; color: rgba(255,255,255,0.35); font-size: 13px; margin-bottom: 20px;
    }
    .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: rgba(255,255,255,0.12); }
    .divider span { padding: 0 12px; }
    .input-wrap { position: relative; margin-bottom: 14px; }
    .input-wrap svg {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      width: 20px; height: 20px; color: rgba(255,255,255,0.45);
    }
    input[type="text"] {
      width: 100%; height: 52px; padding: 0 16px 0 48px;
      border-radius: 14px; border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05); color: #fff; font-size: 15px; outline: none;
    }
    input[type="text"]::placeholder { color: rgba(255,255,255,0.3); }
    input[type="text"]:focus { border-color: rgba(139, 92, 246, 0.5); background: rgba(255,255,255,0.08); }
    input[type="text"].error { border-color: #ef4444; animation: shake 0.35s ease-in-out; }
    @keyframes shake {
      0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)}
    }
    .error-text { color: #ef4444; font-size: 12px; text-align: center; margin: -6px 0 12px; min-height: 18px; }
    .btn-primary {
      width: 100%; height: 50px; border-radius: 14px; border: none;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      color: #fff; font-size: 16px; font-weight: 600;
      box-shadow: 0 8px 24px rgba(59, 130, 246, 0.3); cursor: pointer;
    }
    .btn-primary:active { transform: scale(0.98); }

    /* 公告页 */
    .app { display: none; position: relative; z-index: 1; min-height: 100%; padding-bottom: 40px; }
    .app-header {
      position: sticky; top: 0; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px;
      background: rgba(11, 11, 16, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .menu-btn { width: 36px; height: 36px; display: flex; flex-direction: column; justify-content: center; gap: 5px; }
    .menu-btn span { display: block; height: 2px; background: rgba(255,255,255,0.7); border-radius: 2px; }
    .menu-btn span:nth-child(1) { width: 18px; }
    .menu-btn span:nth-child(2) { width: 14px; }
    .header-title { font-size: 18px; font-weight: 700; letter-spacing: 2px; }
    .moon-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; }
    .moon-btn svg { width: 22px; height: 22px; color: rgba(255,255,255,0.7); }

    .container { padding: 16px; max-width: 520px; margin: 0 auto; }

    .welcome-card {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px; padding: 20px; margin-bottom: 16px;
    }
    .welcome-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .welcome-icon {
      width: 44px; height: 44px; border-radius: 14px;
      background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .welcome-icon svg { width: 24px; height: 24px; }
    .welcome-title { font-size: 22px; font-weight: 700; }
    .welcome-desc { font-size: 13px; color: rgba(255,255,255,0.5); line-height: 1.5; }

    .count-bar {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; padding: 14px 16px; margin-bottom: 16px;
    }
    .count-item { display: flex; align-items: center; gap: 8px; }
    .count-icon { width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: rgba(37, 99, 235, 0.15); color: #60a5fa; }
    .count-icon svg { width: 18px; height: 18px; }
    .count-label { font-size: 12px; color: rgba(255,255,255,0.45); }
    .count-num { font-size: 18px; font-weight: 700; }

    .announcement-card {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px; padding: 18px; margin-bottom: 16px;
    }
    .ann-header { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 14px; }
    .ann-icon {
      width: 50px; height: 50px; border-radius: 16px; flex-shrink: 0;
      background: linear-gradient(135deg, #2563eb 0%, #06b6d4 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 24px rgba(37, 99, 235, 0.25);
    }
    .ann-icon svg { width: 26px; height: 26px; }
    .ann-meta-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .ann-type { font-size: 12px; color: rgba(255,255,255,0.45); }
    .ann-title { font-size: 19px; font-weight: 700; }
    .ann-tags { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0 14px; }
    .ann-tag {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-radius: 20px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
      font-size: 12px; color: rgba(255,255,255,0.65);
    }
    .ann-body { font-size: 15px; line-height: 1.7; color: rgba(255,255,255,0.85); }

    .footer { text-align: center; padding: 20px; font-size: 12px; color: rgba(255,255,255,0.35); }
  </style>
</head>
<body>
  <div class="bg"></div>

  <div class="login-wrap" id="loginPage">
    <div class="logo">怀</div>
    <div class="login-title">怀星</div>
    <div class="login-sub">那天，我听见了地铁逃生的声音，又细微又坚定。</div>

    <div class="login-box">
      <div class="divider"><span>进入服务器</span></div>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
          <line x1="8" y1="21" x2="16" y2="21"></line>
          <line x1="12" y1="17" x2="12" y2="21"></line>
        </svg>
        <input type="text" id="serverInput" placeholder="请输入服务器名称" autocomplete="off" />
      </div>
      <div class="error-text" id="errorText"></div>
      <button class="btn-primary" onclick="checkServer()">进入公告</button>
    </div>
  </div>

  <div class="app" id="appPage">
    <div class="app-header">
      <div class="menu-btn"><span></span><span></span></div>
      <div class="header-title">怀星</div>
      <div class="moon-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </div>
    </div>

    <div class="container">
      <div class="welcome-card">
        <div class="welcome-row">
          <div class="welcome-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" color="#fff">
              <path d="M3 11l18-5v12L3 14v-3z"></path>
              <path d="M11.6 16.8a3 3 0 1 1-3.2-4.8"></path>
            </svg>
          </div>
          <div class="welcome-title">公告中心</div>
        </div>
        <div class="welcome-desc">集中查看系统维护、版本更新和运营通知。</div>
      </div>

      <div class="count-bar">
        <div class="count-item">
          <div class="count-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l18-5v12L3 14v-3z"></path><path d="M11.6 16.8a3 3 0 1 1-3.2-4.8"></path></svg>
          </div>
          <div><div class="count-label">公告</div><div class="count-num" id="countNum">1</div></div>
        </div>
      </div>

      <div id="announcementList"></div>
    </div>

    <div class="footer">企鹅交流：1043816309</div>
  </div>

  <script>
    const CORRECT_NAME = "怀星服务器";

    // ========================================================
    // 公告数据区：要发新公告就改这里
    // ========================================================
    const announcements = [
      {
        id: 2,
        title: "服务器暂时关闭通知",
        author: "怀星官方",
        date: "2026-07-01",
        time: "2026-07-01 00:00:00",
        content: "服务器暂时关闭，机器人刷屏太多，维护完成后将重新开放。"
      },
      {
        id: 1,
        title: "怀星服务器开服公告",
        author: "怀星官方",
        date: "2025-12-23",
        time: "2025-12-23 15:00:00",
        content: "怀星地铁逃生服务器正式开服！欢迎大家加入体验。"
      }
    ];
    // ========================================================

    function checkServer() {
      const val = document.getElementById("serverInput").value.trim();
      const err = document.getElementById("errorText");
      const input = document.getElementById("serverInput");
      if (val !== CORRECT_NAME) {
        err.textContent = "服务器名称错误，请输入：怀星服务器";
        input.classList.add("error");
        setTimeout(() => input.classList.remove("error"), 350);
        return;
      }
      document.getElementById("loginPage").style.display = "none";
      document.getElementById("appPage").style.display = "block";
      render();
    }

    document.getElementById("serverInput").addEventListener("keypress", e => {
      if (e.key === "Enter") checkServer();
    });

    function render() {
      document.getElementById("countNum").textContent = announcements.length;
      document.getElementById("announcementList").innerHTML = announcements.map(a => `
        <div class="announcement-card">
          <div class="ann-header">
            <div class="ann-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" color="#fff">
                <path d="M3 11l18-5v12L3 14v-3z"></path>
                <path d="M11.6 16.8a3 3 0 1 1-3.2-4.8"></path>
              </svg>
            </div>
            <div>
              <div class="ann-meta-top"><span class="ann-type">公告</span></div>
              <div class="ann-title">${a.title}</div>
            </div>
          </div>
          <div class="ann-tags">
            <div class="ann-tag">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
              ${a.author}
            </div>
            <div class="ann-tag">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
              ${a.time}
            </div>
            <div class="ann-tag">${a.date.slice(5)}</div>
          </div>
          <div class="ann-body">${a.content.replace(/\n/g, "<br>")}</div>
        </div>
      `).join("");
    }
  </script>
</body>
</html>
